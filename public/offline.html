<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're offline — Arvind Gupta Toys</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #1a1612;
      color: #f5f0e8;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 12px;
      color: #f5f0e8;
    }
    p {
      color: #b8b0a0;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background-color: #c8531a;
      color: #f5f0e8;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { background-color: #ff6b2b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>No internet connection. Connect to browse science toys, films and books.</p>
    <a href="/">Try again</a>
  </div>
</body>
</html>
